{% extends "base.html" %}

{% block title %}
Login - Zachify
{% endblock %}

{% block content %}

<div class="login-page">

    <h1>Welcome Back 👋</h1>

    <p>Sign in to continue shopping on Zachify</p>

    <form method="POST" action="/login">

        <label>Email Address</label>

        <input
            type="email"
            name="email"
            placeholder="Enter your email"
            required
        >

        <label>Password</label>

        <input
            type="password"
            name="password"
            placeholder="Enter your password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

</div>

{% endblock %}
